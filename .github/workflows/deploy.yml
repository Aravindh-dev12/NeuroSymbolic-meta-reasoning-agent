name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main
      - master
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Install Python and huggingface_hub
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install huggingface_hub

      - name: Deploy to HF Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "❌ Error: HF_TOKEN secret is not set in GitHub Secrets."
            exit 1
          fi
          
          # Sync folder using Python script to auto-resolve username and namespace
          python -c "
          import os
          from huggingface_hub import HfApi
          
          api = HfApi()
          hf_token = os.environ['HF_TOKEN']
          
          try:
              user_info = api.whoami(token=hf_token)
              username = user_info['name']
              repo_id = f'{username}/NeuroSymbolic-Meta-Reasoner'
              print(f'🚀 Deploying automatically to Space: https://huggingface.co/spaces/{repo_id}')
              
              # Ensure space exists
              api.create_repo(
                  repo_id=repo_id,
                  repo_type='space',
                  space_sdk='gradio',
                  private=False,
                  exist_ok=True,
                  token=hf_token
              )
              
              # Upload workspace
              api.upload_folder(
                  folder_path='.',
                  repo_id=repo_id,
                  repo_type='space',
                  ignore_patterns=[
                      'venv/**',
                      '.git/**',
                      '.github/**',
                      'logs/**',
                      'data/**',
                      'models/**',
                      'cache/**',
                      '__pycache__/**',
                      '**/*.pyc',
                      '**/.DS_Store',
                      '.env'
                  ],
                  token=hf_token
              )
              print('✅ CI/CD Space synchronisation completed successfully!')
          except Exception as e:
              print(f'❌ Error during automatic deployment: {e}')
              exit(1)
          "
